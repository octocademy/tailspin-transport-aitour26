name: "Copilot Setup Steps"

# Automatically run the setup steps when they are changed to allow for easy validation,
# and allow manual testing through the repository's "Actions" tab
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    # Set the permissions to the lowest permissions possible needed for your steps.
    # Copilot will be given its own token for its operations.
    permissions:
      # Needed to clone the repository and install dependencies
      contents: read

    # Define the steps that will run before the Copilot agent starts working.
    # These steps set up the development environment for the Tailspin Toys Next.js project.
    steps:
      # Step 1: Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v5

      # Step 2: Set up Node.js with npm caching for faster dependency installation
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # Step 3: Set up the development environment
      # Installs dependencies, configures Prisma, runs migrations, and seeds the database
      - name: Set up development environment
        run: |
          npm ci
          echo "DATABASE_URL=file:./dev.db" > .env
          npx prisma generate
          npx prisma migrate reset --force
